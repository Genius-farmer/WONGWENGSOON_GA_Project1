<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DO RE MI - Duet with me!</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="game-container">
      <h1>DO RE MI - Duet with me!!</h1>

      <h2 id="message"></h2>

      <div id="maze" class="hidden">
        <div class="cell" id="cell-0">0</div>
        <div class="cell" id="cell-1">1</div>
        <div class="cell" id="cell-2">2</div>
        <div class="cell" id="cell-3">3</div>
        <div class="cell" id="cell-4">4</div>
        <div class="cell" id="cell-5">5</div>
        <div class="cell" id="cell-6">6</div>
        <div class="cell" id="cell-7">7</div>
        <div class="cell" id="cell-8">8</div>
      </div>

      <div id="controls" class="hidden">
        <button id="do">Do</button>
        <button id="re">Re</button>
        <button id="mi">Mi</button>
        <button id="fa">Fa</button>
      </div>

      <div id="game-actions">
        <button id="start">Start</button>
        <button id="instructions">Instructions</button>
        <button id="reset">Reset</button>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>

<!-- you can actually <div class="hidden" id="maze"></div> it's a Key-value Pair-->
<!-- class="cell" is for styling / grouping -->
<!-- id="cell-0" is unique identifier -->
<!-- id vs class , id must be unique , #id -->
<!-- class can be use on many elements -->
